<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Song Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #1a1a1a;
      --border:  #2e2e2e;
      --text:    #f0f0f0;
      --muted:   #777;
      --yellow:  #ffe000;
      --green:   #00e050;
      --red:     #ff3030;
      --blue:    #40a0ff;
      --p1: #40a0ff; --p1t: #000;
      --p2: #00e050; --p2t: #000;
      --p3: #ff3030; --p3t: #fff;
      --p4: #ffe000; --p4t: #000;
    }

    html, body {
      min-height: 100%; background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app { display: flex; flex-direction: column; gap: 12px; padding: 16px; max-width: 480px; margin: 0 auto; }

    h1 { text-align: center; font-size: 1.6rem; font-weight: 700; color: var(--yellow); letter-spacing: .08em; padding: 8px 0 4px; }

    /* ── Karten ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
    .card-title { font-size: .68rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 10px; }

    /* ── Buttons ── */
    button { border: none; border-radius: 10px; padding: 11px 18px; font-size: .95rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; -webkit-tap-highlight-color: transparent; }
    button:active { opacity: .72; transform: scale(.97); }
    button:disabled { opacity: .3; cursor: not-allowed; }
    .btn-yellow { background: var(--yellow); color: #000; }
    .btn-green  { background: var(--green);  color: #000; }
    .btn-red    { background: var(--red);    color: #fff; }
    .btn-blue   { background: var(--blue);   color: #000; }
    .btn-spotify { background: #1DB954; color: #fff; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }

    /* ── Status-Dots ── */
    .status-row { display: flex; align-items: center; gap: 8px; font-size: .9rem; margin-bottom: 10px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
    .dot.ok   { background: var(--green); }
    .dot.busy { background: var(--yellow); animation: pulse 1s infinite; }
    .dot.err  { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }

    /* ── Spotify aktuell laufend ── */
    #spotify-now { display: flex; align-items: center; gap: 10px; margin: 10px 0; min-height: 48px; }
    #spotify-art { width: 48px; height: 48px; border-radius: 6px; background: var(--border); flex-shrink: 0; object-fit: cover; }
    #spotify-info { overflow: hidden; }
    #spotify-track { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #spotify-artist { font-size: .78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Progress ── */
    #prog-wrap { width: 100%; height: 5px; background: var(--border); border-radius: 3px; margin: 6px 0 2px; cursor: pointer; }
    #prog-bar  { height: 100%; border-radius: 3px; background: #1DB954; width: 0%; pointer-events: none; }
    .time-row  { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); }

    /* ── Steuerung ── */
    #round-num { font-size: 1.05rem; font-weight: 600; text-align: center; color: var(--muted); margin-bottom: 10px; }

    /* ── Spieler-Grid ── */
    #player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .pbadge { border-radius: 10px; padding: 8px; font-size: .82rem; font-weight: 600; text-align: center; background: var(--border); color: var(--muted); border: 2px solid transparent; transition: all .25s; }
    .pbadge.active { color: #000 !important; }

    /* ── Buzz Overlay ── */
    #buzz-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.93); flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    #buzz-overlay.show { display: flex; }
    #buzz-big   { font-size: clamp(3rem,14vw,5rem); font-weight: 900; letter-spacing: .04em; text-align: center; line-height: 1.05; }
    #buzz-sub   { font-size: 1.4rem; color: var(--text); opacity: .85; }
    #buzz-rnd   { font-size: .9rem; color: var(--muted); }
    #buzz-actions { display: flex; gap: 16px; margin-top: 20px; }
    #buzz-actions button { min-width: 130px; padding: 15px 24px; font-size: 1.1rem; border-radius: 14px; }
    .btn-richtig { background: var(--green); color: #000; }
    .btn-falsch  { background: var(--red);   color: #fff; }

    /* ── Spieler-Grid ── */
    .pbadge.locked { opacity: .35; text-decoration: line-through; }

    /* ── Log ── */
    #log-box { max-height: 120px; overflow-y: auto; font-size: .72rem; color: var(--muted); font-family: "SF Mono", monospace; line-height: 1.6; }
    .le { padding: 1px 0; }
    .le.g { color: var(--green); }
    .le.y { color: var(--yellow); }
    .le.b { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>
<!-- Buzz Overlay -->
<div id="buzz-overlay">
  <div id="buzz-big">SPIELER ?</div>
  <div id="buzz-sub">hat gebuzzert!</div>
  <div id="buzz-rnd">Runde 1</div>
  <div id="buzz-actions">
    <button class="btn-richtig" onclick="onRichtig()">✓ Richtig</button>
    <button class="btn-falsch"  onclick="onFalsch()">✗ Falsch</button>
  </div>
</div>

<div id="app">
  <h1>🎵 Song Quiz</h1>

  <!-- ── Spotify ── -->
  <div class="card">
    <div class="card-title">Spotify</div>
    <div class="status-row">
      <div class="dot" id="sp-dot"></div>
      <span id="sp-label">Nicht eingeloggt</span>
    </div>
    <div id="spotify-now" style="display:none">
      <img id="spotify-art" src="" alt="" />
      <div id="spotify-info">
        <div id="spotify-track">—</div>
        <div id="spotify-artist">—</div>
        <div id="prog-wrap" onclick="seekSpotify(event)">
          <div id="prog-bar"></div>
        </div>
        <div class="time-row"><span id="t-cur">0:00</span><span id="t-dur">0:00</span></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-spotify" id="btn-sp-login"  onclick="spotifyLogin()">🎵 Mit Spotify einloggen</button>
      <button class="btn-outline" id="btn-sp-logout" onclick="spotifyLogout()" style="display:none">Ausloggen</button>
    </div>
  </div>

  <!-- ── BLE ── -->
  <div class="card">
    <div class="card-title">BuzzQuiz Board</div>
    <div class="status-row">
      <div class="dot" id="ble-dot"></div>
      <span id="ble-label">Nicht verbunden</span>
    </div>
    <div class="btn-row">
      <button class="btn-blue"    id="btn-ble-on"  onclick="bleConnect()">🔵 Verbinden</button>
      <button class="btn-outline" id="btn-ble-off" onclick="bleDisconnect()" disabled>Trennen</button>
    </div>
  </div>

  <!-- ── Steuerung ── -->
  <div class="card">
    <div class="card-title">Spielsteuerung</div>
    <div id="round-num">Runde 1</div>
    <div class="btn-row">
      <button class="btn-yellow" id="btn-start" onclick="startRound()" disabled>▶ Runde starten</button>
      <button class="btn-red"    id="btn-reset" onclick="resetRound()" disabled>↺ Reset</button>
    </div>
    <div id="player-grid">
      <div class="pbadge" id="p1" style="border-color:var(--p1)">Spieler 1</div>
      <div class="pbadge" id="p2" style="border-color:var(--p2)">Spieler 2</div>
      <div class="pbadge" id="p3" style="border-color:var(--p3)">Spieler 3</div>
      <div class="pbadge" id="p4" style="border-color:var(--p4)">Spieler 4</div>
    </div>
  </div>

  <!-- ── Log ── -->
  <div class="card">
    <div class="card-title">Log</div>
    <div id="log-box"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  KONFIGURATION
// ══════════════════════════════════════════════
const CLIENT_ID    = '7935f35ec0bf48f8b259b23a5710eb30';
const REDIRECT_URI = 'https://mat41613.github.io/EDDS/';
const SCOPES       = 'user-read-playback-state user-modify-playback-state';

const SVC_UUID     = '0000ff00-0000-1000-8000-00805f9b34fb';
const NOTIFY_UUID  = '0000ff01-0000-1000-8000-00805f9b34fb';
const CTRL_UUID    = '0000ff02-0000-1000-8000-00805f9b34fb';

const P_COLORS = ['','#40a0ff','#00e050','#ff3030','#ffe000'];
const P_TEXT   = ['','#000',   '#000',   '#fff',   '#000'  ];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let accessToken  = null;
let tokenExpires = 0;
let refreshToken = null;
let bleDevice    = null;
let ctrlChr      = null;
let currentRound = 1;
let progressTimer = null;
let currentProgress = 0;
let currentDuration = 0;
let currentBuzzPlayer = 0;
let scores = [0, 0, 0, 0, 0];   // index 0 unused
let lockedPlayers = new Set();

// ══════════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════════
function log(msg, cls='') {
  const ts = new Date().toLocaleTimeString('de',{hour12:false});
  const box = document.getElementById('log-box');
  box.insertAdjacentHTML('afterbegin',`<div class="le ${cls}">[${ts}] ${msg}</div>`);
  while(box.children.length > 60) box.removeChild(box.lastChild);
}

// ══════════════════════════════════════════════
//  SPOTIFY – PKCE OAuth
// ══════════════════════════════════════════════
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function spotifyLogin() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(96)));
  const challenge = b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
  localStorage.setItem('pkce_v', verifier);

  const url = 'https://accounts.spotify.com/authorize?' + new URLSearchParams({
    client_id:             CLIENT_ID,
    response_type:         'code',
    redirect_uri:          REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge:        challenge,
    scope:                 SCOPES,
  });
  location.href = url;
}

async function handleCallback(code) {
  // URL sofort sauber machen
  history.replaceState(null,'', location.pathname);

  const verifier = localStorage.getItem('pkce_v');
  if (!verifier) { log('PKCE-Fehler: kein Verifier', 'y'); return; }

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     CLIENT_ID,
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      code_verifier: verifier,
    })
  });

  const data = await res.json();
  if (data.access_token) {
    saveTokens(data);
    log('Spotify eingeloggt', 'g');
    updateSpotifyUI(true);
    startPolling();
  } else {
    log('Token-Fehler: ' + JSON.stringify(data), 'y');
  }
}

async function refreshAccessToken() {
  const rt = localStorage.getItem('sp_refresh');
  if (!rt) return false;

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id:     CLIENT_ID,
      grant_type:    'refresh_token',
      refresh_token: rt,
    })
  });

  const data = await res.json();
  if (data.access_token) {
    saveTokens(data);
    return true;
  }
  return false;
}

function saveTokens(data) {
  accessToken  = data.access_token;
  tokenExpires = Date.now() + (data.expires_in - 60) * 1000;
  if (data.refresh_token) {
    refreshToken = data.refresh_token;
    localStorage.setItem('sp_refresh', refreshToken);
  }
  localStorage.setItem('sp_token',   accessToken);
  localStorage.setItem('sp_expires', tokenExpires);
}

function spotifyLogout() {
  accessToken = null; refreshToken = null; tokenExpires = 0;
  localStorage.removeItem('sp_token');
  localStorage.removeItem('sp_expires');
  localStorage.removeItem('sp_refresh');
  localStorage.removeItem('pkce_v');
  stopPolling();
  updateSpotifyUI(false);
  resetNowPlaying();
  log('Spotify ausgeloggt');
}

async function getToken() {
  if (accessToken && Date.now() < tokenExpires) return accessToken;
  if (await refreshAccessToken()) return accessToken;
  spotifyLogout();
  return null;
}

// ══════════════════════════════════════════════
//  SPOTIFY – API CALLS
// ══════════════════════════════════════════════
async function spotifyCall(method, path, body) {
  const token = await getToken();
  if (!token) return null;

  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + token }
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch('https://api.spotify.com/v1' + path, opts);
  if (res.status === 401) { await refreshAccessToken(); return null; }
  if (res.status === 204 || res.status === 202) return {};
  if (!res.ok) return null;
  try { return await res.json(); } catch { return {}; }
}

async function pauseSpotify() {
  const result = await spotifyCall('PUT', '/me/player/pause');
  if (result !== null) log('Spotify: pausiert', 'g');
  else log('Spotify pause fehlgeschlagen (kein aktives Geraet?)', 'y');
}

async function resumeSpotify() {
  const result = await spotifyCall('PUT', '/me/player/play');
  if (result !== null) log('Spotify: fortgesetzt', 'g');
}

async function spotifyNext() {
  const result = await spotifyCall('POST', '/me/player/next');
  if (result !== null) log('Spotify: naechster Song', 'g');
  else log('Spotify next fehlgeschlagen (kein aktives Geraet?)', 'y');
}

async function seekSpotify(e) {
  if (!currentDuration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const ms   = Math.round(((e.clientX - rect.left) / rect.width) * currentDuration);
  await spotifyCall('PUT', `/me/player/seek?position_ms=${ms}`);
}

// ══════════════════════════════════════════════
//  SPOTIFY – POLLING (aktueller Song)
// ══════════════════════════════════════════════
let pollTimer = null;

function startPolling() { if (!pollTimer) { fetchNowPlaying(); pollTimer = setInterval(fetchNowPlaying, 5000); } }
function stopPolling()  { clearInterval(pollTimer); pollTimer = null; clearInterval(progressTimer); progressTimer = null; }

async function fetchNowPlaying() {
  const data = await spotifyCall('GET', '/me/player?market=DE');
  if (!data || !data.item) { resetNowPlaying(); return; }

  const track   = data.item;
  const art     = track.album.images[2]?.url || track.album.images[0]?.url || '';
  const name    = track.name;
  const artists = track.artists.map(a=>a.name).join(', ');

  document.getElementById('spotify-art').src    = art;
  document.getElementById('spotify-track').textContent  = name;
  document.getElementById('spotify-artist').textContent = artists;
  document.getElementById('spotify-now').style.display  = 'flex';

  currentProgress = data.progress_ms || 0;
  currentDuration = track.duration_ms || 1;

  updateProgress();
  clearInterval(progressTimer);
  if (data.is_playing) {
    progressTimer = setInterval(() => {
      currentProgress = Math.min(currentProgress + 1000, currentDuration);
      updateProgress();
    }, 1000);
  }
}

function updateProgress() {
  const pct = (currentProgress / currentDuration) * 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('t-cur').textContent = fmtMs(currentProgress);
  document.getElementById('t-dur').textContent = fmtMs(currentDuration);
}

function resetNowPlaying() {
  document.getElementById('spotify-now').style.display = 'none';
  clearInterval(progressTimer); progressTimer = null;
}

function fmtMs(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════
//  BLE
// ══════════════════════════════════════════════
async function bleConnect() {
  if (!navigator.bluetooth) {
    alert('Web Bluetooth nicht verfügbar.\nAuf iPhone: Bluefy App verwenden.\nAuf Desktop: Chrome verwenden.');
    return;
  }
  try {
    setBleDot('busy', 'Verbinde…');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'BuzzQuiz' }],
      optionalServices: [SVC_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onBleDisconnect);

    const server = await bleDevice.gatt.connect();
    const svc    = await server.getPrimaryService(SVC_UUID);
    const notChr = await svc.getCharacteristic(NOTIFY_UUID);
    ctrlChr      = await svc.getCharacteristic(CTRL_UUID);

    await notChr.startNotifications();
    notChr.addEventListener('characteristicvaluechanged', onBleNotify);

    setBleDot('ok', `Verbunden: ${bleDevice.name}`);
    document.getElementById('btn-ble-on').disabled  = true;
    document.getElementById('btn-ble-off').disabled = false;
    document.getElementById('btn-start').disabled   = false;
    document.getElementById('btn-reset').disabled   = false;
    log('BLE verbunden', 'g');
  } catch(e) {
    setBleDot('err', 'Verbindung fehlgeschlagen');
    log('BLE Fehler: ' + e.message, 'y');
  }
}

function bleDisconnect() {
  bleDevice?.gatt?.disconnect();
}

function onBleDisconnect() {
  ctrlChr = null;
  setBleDot('err', 'Getrennt');
  document.getElementById('btn-ble-on').disabled  = false;
  document.getElementById('btn-ble-off').disabled = true;
  document.getElementById('btn-start').disabled   = true;
  document.getElementById('btn-reset').disabled   = true;
  log('BLE getrennt', 'y');
}

function onBleNotify(e) {
  const raw = new TextDecoder().decode(e.target.value);
  log('← ' + raw);
  let msg;
  try { msg = JSON.parse(raw); } catch { return; }
  if (msg.type === 'pause') handleBuzz(msg.player, msg.round);
}

async function sendByte(b) {
  if (!ctrlChr) return;
  try { await ctrlChr.writeValueWithoutResponse(new Uint8Array([b])); }
  catch(e) { log('BLE senden fehlgeschlagen: '+e.message,'y'); }
}

// ══════════════════════════════════════════════
//  SPIELLOGIK
// ══════════════════════════════════════════════
async function startRound() {
  lockedPlayers.clear();
  resetBadges();
  updateRound();
  await spotifyNext();
  sendByte(0x53); // 'S'
  log(`→ START Runde ${currentRound}`, 'g');
}

function resetRound() {
  sendByte(0x52); // 'R'
  currentRound++;
  lockedPlayers.clear();
  updateRound();
  resetBadges();
  log(`→ RESET → Runde ${currentRound}`);
}

async function handleBuzz(player, round) {
  currentRound = round;
  currentBuzzPlayer = player;

  // 1. Spotify sofort pausieren
  await pauseSpotify();
  clearInterval(progressTimer);

  // 2. Spieler-Badge hervorheben
  const badge = document.getElementById(`p${player}`);
  if (badge) {
    badge.style.background = P_COLORS[player] || '#fff';
    badge.style.color      = P_TEXT[player]   || '#000';
    badge.classList.add('active');
    badge.textContent = `? Spieler ${player} (${scores[player]} Pkt)`;
  }

  // 3. Overlay
  const col = P_COLORS[player] || '#fff';
  document.getElementById('buzz-big').textContent = `SPIELER ${player}`;
  document.getElementById('buzz-big').style.color = col;
  document.getElementById('buzz-rnd').textContent = `Runde ${round}`;
  document.getElementById('buzz-overlay').classList.add('show');

  log(`Buzz: Spieler ${player} – Runde ${round}`, 'b');
}

async function onRichtig() {
  document.getElementById('buzz-overlay').classList.remove('show');
  // Punkt gutschreiben
  if (currentBuzzPlayer >= 1 && currentBuzzPlayer <= 4) {
    scores[currentBuzzPlayer]++;
    log(`+1 Punkt fuer Spieler ${currentBuzzPlayer} (jetzt ${scores[currentBuzzPlayer]} Pkt)`, 'g');
  }
  // Song weiterlaufen lassen
  await resumeSpotify();
  // Naechste Runde
  resetRound();
  updateScoreBadges();
}

async function onFalsch() {
  document.getElementById('buzz-overlay').classList.remove('show');
  const player = currentBuzzPlayer;

  // Spieler sperren: 2-Byte-Befehl 'L' + player_id
  if (ctrlChr && player >= 1 && player <= 4) {
    try {
      await ctrlChr.writeValueWithoutResponse(new Uint8Array([0x4C, player]));
      log(`→ LOCK Spieler ${player}`, 'y');
    } catch(e) { log('BLE senden fehlgeschlagen: '+e.message,'y'); }
  }

  lockedPlayers.add(player);

  // Badge als gesperrt markieren
  const badge = document.getElementById(`p${player}`);
  if (badge) {
    badge.style.background = 'var(--border)';
    badge.style.color      = 'var(--muted)';
    badge.classList.remove('active');
    badge.classList.add('locked');
    badge.textContent = `✗ Spieler ${player} (${scores[player]} Pkt)`;
  }

  // Song weiter abspielen – andere koennen noch buzzen
  await resumeSpotify();
  log(`Spieler ${player} gesperrt – Runde laeuft weiter`, 'y');
}

function updateRound() {
  document.getElementById('round-num').textContent = `Runde ${currentRound}`;
}

function resetBadges() {
  for(let i=1;i<=4;i++) {
    const b = document.getElementById(`p${i}`);
    if(!b) continue;
    b.classList.remove('active', 'locked');
    b.style.background = 'var(--border)';
    b.style.color      = 'var(--muted)';
    b.textContent      = `Spieler ${i} (${scores[i]} Pkt)`;
  }
}

function updateScoreBadges() {
  for(let i=1;i<=4;i++) {
    const b = document.getElementById(`p${i}`);
    if(!b) continue;
    if(!b.classList.contains('active') && !b.classList.contains('locked')) {
      b.textContent = `Spieler ${i} (${scores[i]} Pkt)`;
    }
  }
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function setBleDot(state, label) {
  document.getElementById('ble-dot').className   = 'dot ' + {ok:'ok',busy:'busy',err:'err'}[state];
  document.getElementById('ble-label').textContent = label;
}

function updateSpotifyUI(loggedIn) {
  document.getElementById('sp-dot').className        = 'dot ' + (loggedIn ? 'ok' : '');
  document.getElementById('sp-label').textContent    = loggedIn ? 'Eingeloggt' : 'Nicht eingeloggt';
  document.getElementById('btn-sp-login').style.display  = loggedIn ? 'none'  : '';
  document.getElementById('btn-sp-logout').style.display = loggedIn ? ''      : 'none';
}

// ══════════════════════════════════════════════
//  INIT – beim Laden der Seite
// ══════════════════════════════════════════════
(async function init() {
  // 1. OAuth Callback abfangen
  const params = new URLSearchParams(location.search);
  if (params.has('code')) {
    await handleCallback(params.get('code'));
    return;
  }

  // 2. Gespeicherten Token laden
  const saved    = localStorage.getItem('sp_token');
  const expires  = parseInt(localStorage.getItem('sp_expires') || '0');
  refreshToken   = localStorage.getItem('sp_refresh');

  if (saved && Date.now() < expires) {
    accessToken  = saved;
    tokenExpires = expires;
    updateSpotifyUI(true);
    startPolling();
    log('Spotify-Session wiederhergestellt', 'g');
  } else if (refreshToken) {
    if (await refreshAccessToken()) {
      updateSpotifyUI(true);
      startPolling();
      log('Spotify-Token erneuert', 'g');
    }
  } else {
    log('Bitte mit Spotify einloggen');
  }

  log('Song Quiz bereit');
})();
</script>
