<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>BuzzQuiz – Buzzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --tc: #40a0ff; --tt: #000; }

    html, body {
      height: 100%; width: 100%;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ── Statusleiste oben ─────────────────────────────── */
    #status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 14px 18px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      font-size: .82rem;
    }
    #status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #555; flex-shrink: 0;
      transition: background .3s;
    }
    #status-dot.ok  { background: #00e050; }
    #status-dot.err { background: #ff3030; }
    #status-dot.spin {
      background: #ffe000;
      animation: blink .8s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    #status-text { color: #aaa; }

    /* ── Teamname ──────────────────────────────────────── */
    #team-name {
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      font-weight: 900;
      letter-spacing: .06em;
      margin-bottom: clamp(24px, 6vh, 48px);
      color: var(--tc);
    }

    /* ── Buzzer-Button ─────────────────────────────────── */
    #buzz-btn {
      width:  min(62vw, 62vh, 260px);
      height: min(62vw, 62vh, 260px);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      letter-spacing: .04em;
      color: var(--tt);
      background: #333;
      box-shadow:
        0 12px 40px rgba(0,0,0,.6),
        0  4px 12px rgba(0,0,0,.4),
        inset 0 -8px 0 rgba(0,0,0,.35);
      transition: background .25s, transform .08s, box-shadow .08s;
      -webkit-tap-highlight-color: transparent;
    }
    #buzz-btn:active {
      transform: scale(.93);
      box-shadow:
        0  4px 16px rgba(0,0,0,.6),
        0  2px  6px rgba(0,0,0,.4),
        inset 0 -3px 0 rgba(0,0,0,.35);
    }

    /* Zustände */
    #buzz-btn.waiting { background: #2a2a2a; color: #444; cursor: not-allowed; }
    #buzz-btn.ready   { background: var(--tc); color: var(--tt); }
    #buzz-btn.buzzed  { background: #ffffff;   color: #111; transform: scale(.96); }
    #buzz-btn.locked  { background: #1e1e1e;   color: #333; cursor: not-allowed; }

    /* Pulsieren wenn bereit */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 4px 12px rgba(0,0,0,.4),
                         inset 0 -8px 0 rgba(0,0,0,.35), 0 0 0 0 var(--tc); }
      60%  { box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 4px 12px rgba(0,0,0,.4),
                         inset 0 -8px 0 rgba(0,0,0,.35), 0 0 0 24px transparent; }
      100% { box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 4px 12px rgba(0,0,0,.4),
                         inset 0 -8px 0 rgba(0,0,0,.35), 0 0 0 0 transparent; }
    }
    #buzz-btn.ready { animation: pulse-ring 2.2s ease-out infinite; }

    /* ── Status-Text unter Button ──────────────────────── */
    #buzz-label {
      margin-top: clamp(18px, 4vh, 32px);
      font-size: clamp(.9rem, 3.5vw, 1.1rem);
      color: #666;
      min-height: 1.6em;
      text-align: center;
      transition: color .3s;
    }
    #buzz-label.active { color: var(--tc); }
    #buzz-label.err    { color: #ff3030; }
  </style>
</head>
<body>

  <div id="status-bar">
    <div id="status-dot spin"></div>
    <span id="status-text">Verbinde…</span>
  </div>

  <div id="team-name">TEAM ?</div>

  <button id="buzz-btn" class="waiting" onclick="onBuzz()">BUZZ!</button>

  <div id="buzz-label">Warte auf Verbindung…</div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    // ── URL-Parameter ──────────────────────────────────────
    const params   = new URLSearchParams(location.search);
    const ROOM_ID  = params.get('room');
    const PLAYER   = parseInt(params.get('player') || '1');

    const TEAM_NAMES  = ['','Team Blau','Team Grün','Team Rot','Team Gelb'];
    const TEAM_COLORS = ['','#40a0ff','#00e050','#ff3030','#ffe000'];
    const TEXT_COLORS = ['','#000','#000','#fff','#000'];

    const teamName  = TEAM_NAMES[PLAYER]  || `Team ${PLAYER}`;
    const teamColor = TEAM_COLORS[PLAYER] || '#40a0ff';
    const textColor = TEXT_COLORS[PLAYER] || '#000';

    document.title = `${teamName} – BuzzQuiz`;
    document.getElementById('team-name').textContent = teamName;
    document.documentElement.style.setProperty('--tc', teamColor);
    document.documentElement.style.setProperty('--tt', textColor);

    const btn   = document.getElementById('buzz-btn');
    const label = document.getElementById('buzz-label');

    let canBuzz = false;
    let client  = null;

    const MQTT_BROKER  = 'wss://broker.hivemq.com:8884/mqtt';
    const TOPIC_CMD    = `buzzquiz/${ROOM_ID}/cmd`;
    const TOPIC_BUZZ   = `buzzquiz/${ROOM_ID}/buzz`;

    // ── UI-Helfer ─────────────────────────────────────────
    function setStatus(text, state) {
      document.getElementById('status-text').textContent = text;
      document.getElementById('status-dot').className    = state || '';
    }
    function setWaiting(msg) {
      canBuzz = false; btn.className = 'waiting'; btn.textContent = 'BUZZ!';
      label.className = ''; label.textContent = msg || 'Warte auf Rundenstart…';
    }
    function setReady() {
      canBuzz = true; btn.className = 'ready'; btn.textContent = 'BUZZ!';
      label.className = 'active'; label.textContent = 'Drücke den Knopf!';
    }
    function setBuzzed() {
      canBuzz = false; btn.className = 'buzzed'; btn.textContent = '●';
      label.className = 'active'; label.textContent = 'Gebuzzert!';
    }
    function setLocked() {
      canBuzz = false; btn.className = 'locked'; btn.textContent = '✗';
      label.className = 'err'; label.textContent = 'Gesperrt für diese Runde';
    }

    // ── Buzz senden ───────────────────────────────────────
    function onBuzz() {
      if (!canBuzz || !client) return;
      navigator.vibrate && navigator.vibrate([60, 30, 60]);
      setBuzzed();
      publish({ type: 'buzz', player: PLAYER });
    }

    function publish(msg) {
      if (client) client.publish(TOPIC_BUZZ, JSON.stringify(msg));
    }

    // ── MQTT verbinden ────────────────────────────────────
    function connect() {
      if (!ROOM_ID) {
        setStatus('Kein Raum-Code – QR-Code neu scannen.', 'err');
        label.className = 'err';
        label.textContent = 'Kein Raum-Code gefunden.';
        return;
      }

      const clientId = `bq_p${PLAYER}_` + Math.random().toString(36).slice(2, 8);
      setStatus('Verbinde mit Moderator…', 'spin');

      client = mqtt.connect(MQTT_BROKER, {
        clientId,
        clean: true,
        connectTimeout: 10000,
        reconnectPeriod: 4000,
      });

      client.on('connect', () => {
        client.subscribe(TOPIC_CMD, err => {
          if (err) {
            setStatus('Subscribe fehlgeschlagen', 'err');
            return;
          }
          setStatus(`Verbunden · ${teamName}`, 'ok');
          // Hallo sagen damit Moderator die Verbindung sieht
          publish({ type: 'hello', player: PLAYER });
          setWaiting();
        });
      });

      client.on('reconnect', () => {
        setStatus('Verbinde erneut…', 'spin');
      });

      client.on('message', (topic, payload) => {
        let msg;
        try { msg = JSON.parse(payload.toString()); } catch { return; }

        // Nachrichten die nur an einen Spieler gerichtet sind filtern
        if (msg.target !== undefined && msg.target !== PLAYER) return;

        if      (msg.type === 'start') setReady();
        else if (msg.type === 'reset') setWaiting();
        else if (msg.type === 'lock')  setLocked();
      });

      client.on('error', e => {
        setStatus(`Verbindungsfehler: ${e.message}`, 'err');
        label.className   = 'err';
        label.textContent = 'Seite neu laden um erneut zu verbinden.';
      });

      client.on('offline', () => {
        canBuzz = false;
        setStatus('Verbindung getrennt', 'err');
      });
    }

    // Beim Verlassen der Seite abmelden
    window.addEventListener('beforeunload', () => {
      if (client) {
        publish({ type: 'bye', player: PLAYER });
      }
    });

    connect();
  </script>
</body>
</html>
